services:
  db:
    image: postgres:13-alpine
    container_name: foodgram-db
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    env_file:
      - .env
    restart: always

  backend:
    image: barashkina/foodgram-backend:latest
    container_name: foodgram-backend
    volumes:
      - static_volume:/app/static
      - media_volume:/app/media
    env_file:
      - .env
    depends_on:
      - db
    restart: always

  frontend:
    image: barashkina/foodgram-frontend:latest
    container_name: foodgram-frontend
    volumes:
      - static_volume:/static
    command: sh -c "cp -r /app/build/* /static/ && chmod -R 755 /static/"
    depends_on:
      - backend
    restart: "no"

  nginx:
  image: nginx:1.25-alpine
  container_name: foodgram-nginx
  ports:
    - "8080:80"
    - "8443:443"
  volumes:
    - ./nginx.conf:/etc/nginx/conf.d/default.conf
    - static_volume:/static
    - media_volume:/media
    - /etc/letsencrypt:/etc/letsencrypt:ro
  depends_on:
    - backend
  restart: always

volumes:
  postgres_data:
  static_volume:
  media_volume: